<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #F5EFE0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
    }

    /* ---- LANDING ---- */

    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('Artboard_1.png') center / cover no-repeat;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #landing.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #box-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 600px;
      height: 600px;
    }

    #button-anim {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 0;
      filter: brightness(1.1) saturate(2.5) contrast(1.6);
    }

    #box {
      position: relative;
      z-index: 1;
      width: 260px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    #box:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    /* ---- MOODBOARD ---- */

    #moodboard {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease 0.2s;
      position: fixed;
      inset: 0;
      background: #d7b5ff url('Jaybday.png') center / contain no-repeat;
    }

    #moodboard.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #moodboard-gif {
      position: absolute;
      top: 0%;
      left: 49.7%;
      transform: translateX(-50%);
      width: 320px;
      pointer-events: none;
    }

    /* ---- CONFETTI VIDEO ---- */

    #confetti-video {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 20;
    }

    /* ---- MUTE BUTTON ---- */

    #mute-btn {
      display: none;
      position: fixed;
      bottom: 28px;
      right: 32px;
      border: 1px solid #B8A898;
      background: transparent;
      color: #6B5A4E;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    #mute-btn:hover {
      border-color: #7A6558;
      color: #3E2F26;
    }
  </style>
</head>
<body>

  <div id="landing">
    <div id="box-wrapper">
      <video id="button-anim" src="button-anim.webm" autoplay loop playsinline muted></video>
      <img id="box" src="button.png" alt="click if u are jay :3">
    </div>
  </div>

  <div id="moodboard">
    <img id="moodboard-gif" src="jaybday.gif" alt="">
  </div>

  <video id="confetti-video" src="confetti.webm" playsinline preload="auto" loop></video>
  <button id="mute-btn">mute</button>

  <script>
    const landing        = document.getElementById('landing');
    const moodboard      = document.getElementById('moodboard');
    const muteBtn        = document.getElementById('mute-btn');
    const box            = document.getElementById('box');
    const confettiVideo = document.getElementById('confetti-video');

    const audio1 = new Audio('happybday%20(2).m4a');
    audio1.loop = true;

    box.addEventListener('click', () => {
      audio1.play();

      landing.classList.add('hidden');
      moodboard.classList.add('visible');
      muteBtn.style.display = 'block';

      confettiVideo.style.display = 'block';
      confettiVideo.play();
    });

    muteBtn.addEventListener('click', () => {
      audio1.muted = !audio1.muted;
      muteBtn.textContent = audio1.muted ? 'unmute' : 'mute';
    });
  </script>
</body>
</html>
