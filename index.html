<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #F5EFE0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
    }

    /* ---- LANDING ---- */

    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F5EFE0;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #landing.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #box {
      width: 280px;
      height: 160px;
      border: 1px solid #B8A898;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #6B5A4E;
      transition: border-color 0.3s ease, color 0.3s ease;
      user-select: none;
    }

    #box:hover {
      border-color: #7A6558;
      color: #3E2F26;
    }

    /* ---- MOODBOARD ---- */

    #moodboard {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease 0.2s;
      padding: 64px 24px 96px;
      min-height: 100vh;
    }

    #moodboard.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #moodboard h1 {
      text-align: center;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.03em;
      color: #4A3B31;
      margin-bottom: 52px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 240px 240px 210px 210px;
      grid-template-areas:
        "a a b"
        "c d b"
        "e e f"
        "g h h";
      gap: 8px;
      max-width: 920px;
      margin: 0 auto;
    }

    .cell { overflow: hidden; background: #EDE4D0; }
    .cell:nth-child(1) { grid-area: a; }
    .cell:nth-child(2) { grid-area: b; }
    .cell:nth-child(3) { grid-area: c; }
    .cell:nth-child(4) { grid-area: d; }
    .cell:nth-child(5) { grid-area: e; }
    .cell:nth-child(6) { grid-area: f; }
    .cell:nth-child(7) { grid-area: g; }
    .cell:nth-child(8) { grid-area: h; }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cell img.missing {
      display: none;
    }

    /* ---- CONFETTI CANVAS ---- */

    #confetti-canvas {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
    }

    /* ---- MUTE BUTTON ---- */

    #mute-btn {
      display: none;
      position: fixed;
      bottom: 28px;
      right: 32px;
      border: 1px solid #B8A898;
      background: transparent;
      color: #6B5A4E;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    #mute-btn:hover {
      border-color: #7A6558;
      color: #3E2F26;
    }
  </style>
</head>
<body>

  <div id="landing">
    <div id="box">For Jay</div>
  </div>

  <div id="moodboard">
    <h1>Hyvää syntymäpäivää, Jay</h1>
    <div id="grid">
      <div class="cell"><img src="images/1.jpg" alt="" onerror="this.classList.add('missing')"></div>
      <div class="cell"><img src="images/2.jpg" alt="" onerror="this.classList.add('missing')"></div>
      <div class="cell"><img src="images/3.jpg" alt="" onerror="this.classList.add('missing')"></div>
      <div class="cell"><img src="images/4.jpg" alt="" onerror="this.classList.add('missing')"></div>
      <div class="cell"><img src="images/5.jpg" alt="" onerror="this.classList.add('missing')"></div>
      <div class="cell"><img src="images/6.jpg" alt="" onerror="this.classList.add('missing')"></div>
      <div class="cell"><img src="images/7.jpg" alt="" onerror="this.classList.add('missing')"></div>
      <div class="cell"><img src="images/8.jpg" alt="" onerror="this.classList.add('missing')"></div>
    </div>
  </div>

  <video id="confetti-video" src="happybday.mp4" playsinline preload="auto" crossorigin="anonymous" style="display:none"></video>
  <canvas id="confetti-canvas"></canvas>
  <button id="mute-btn">mute</button>

  <script>
    const landing        = document.getElementById('landing');
    const moodboard      = document.getElementById('moodboard');
    const muteBtn        = document.getElementById('mute-btn');
    const box            = document.getElementById('box');
    const confettiVideo  = document.getElementById('confetti-video');
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx    = confettiCanvas.getContext('2d', { willReadFrequently: true });

    const audio1 = new Audio('happybday%20(2).m4a');
    audio1.loop = true;

    function lumaKey() {
      if (confettiVideo.paused || confettiVideo.ended) return;
      const w = confettiVideo.videoWidth;
      const h = confettiVideo.videoHeight;
      if (confettiCanvas.width !== w)  confettiCanvas.width  = w;
      if (confettiCanvas.height !== h) confettiCanvas.height = h;
      confettiCtx.drawImage(confettiVideo, 0, 0);
      const frame = confettiCtx.getImageData(0, 0, w, h);
      const d = frame.data;
      for (let i = 0; i < d.length; i += 4) {
        const luma = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
        // smooth falloff: fully transparent below 30, fully opaque above 60
        d[i + 3] = luma < 30 ? 0 : luma < 60 ? Math.round(((luma - 30) / 30) * 255) : 255;
      }
      confettiCtx.putImageData(frame, 0, 0);
      requestAnimationFrame(lumaKey);
    }

    box.addEventListener('click', () => {
      audio1.play();

      landing.classList.add('hidden');
      moodboard.classList.add('visible');
      muteBtn.style.display = 'block';

      confettiCanvas.style.display = 'block';
      confettiVideo.play();
      confettiVideo.addEventListener('playing', () => {
        try {
          lumaKey();
        } catch (e) {
          // fallback: just show video with screen blend if canvas access blocked
          confettiCanvas.style.display = 'none';
          confettiVideo.style.cssText = 'display:block;position:fixed;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:screen;pointer-events:none;z-index:20';
        }
      }, { once: true });
      confettiVideo.addEventListener('ended', () => {
        confettiCanvas.style.display = 'none';
        confettiVideo.style.display = 'none';
      }, { once: true });
    });

    muteBtn.addEventListener('click', () => {
      audio1.muted = !audio1.muted;
      muteBtn.textContent = audio1.muted ? 'unmute' : 'mute';
    });
  </script>
</body>
</html>
